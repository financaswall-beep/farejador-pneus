<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Farejador — Entrar</title>
  <!-- Porta única de login (0095): página standalone, sem CDN, CSS embutido.
       NÃO depende do painel — o painel continua intocado. -->
  <style>
    :root {
      --azul: #1d4ed8;
      --azul-escuro: #1e40af;
      --fundo: #f1f5f9;
      --card: #ffffff;
      --borda: #e2e8f0;
      --texto: #0f172a;
      --texto-suave: #64748b;
      --erro: #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: var(--fundo); color: var(--texto);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
    }
    .card {
      background: var(--card); border: 1px solid var(--borda); border-radius: 16px;
      padding: 28px 24px; width: 100%; max-width: 380px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, .08);
    }
    .logo { text-align: center; margin-bottom: 6px; font-size: 28px; }
    h1 { font-size: 20px; text-align: center; margin: 0 0 4px; }
    .sub { text-align: center; color: var(--texto-suave); font-size: 14px; margin: 0 0 22px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
    input {
      width: 100%; padding: 12px 14px; font-size: 16px;
      border: 1px solid var(--borda); border-radius: 10px; outline: none;
      background: #fff; color: var(--texto);
    }
    input:focus { border-color: var(--azul); box-shadow: 0 0 0 3px rgba(29, 78, 216, .12); }
    button.entrar {
      width: 100%; margin-top: 20px; padding: 13px; font-size: 16px; font-weight: 700;
      color: #fff; background: var(--azul); border: 0; border-radius: 10px; cursor: pointer;
    }
    button.entrar:hover { background: var(--azul-escuro); }
    button.entrar:disabled { opacity: .6; cursor: wait; }
    .erro { color: var(--erro); font-size: 14px; margin-top: 12px; text-align: center; min-height: 18px; }
    /* escolha de loja (quando a pessoa tem mais de uma) */
    #escolha { display: none; }
    .loja-btn {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      width: 100%; margin-top: 10px; padding: 14px; font-size: 15px; text-align: left;
      background: #fff; border: 1px solid var(--borda); border-radius: 12px; cursor: pointer;
    }
    .loja-btn:hover { border-color: var(--azul); background: rgba(29, 78, 216, .04); }
    .loja-nome { font-weight: 700; }
    .loja-papel {
      font-size: 12px; font-weight: 600; color: var(--azul);
      background: rgba(29, 78, 216, .1); padding: 3px 10px; border-radius: 999px; white-space: nowrap;
    }
    .voltar {
      margin-top: 16px; width: 100%; background: none; border: 0; color: var(--texto-suave);
      font-size: 14px; cursor: pointer; text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🐾</div>
    <h1>Farejador</h1>
    <p class="sub">Entre com seu usuário — a gente acha a sua loja.</p>

    <form id="form-login" autocomplete="on">
      <label for="username">Usuário</label>
      <input id="username" name="username" autocomplete="username" autocapitalize="none"
             autocorrect="off" spellcheck="false" required minlength="3" maxlength="60" />
      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password"
             required minlength="6" maxlength="200" />
      <button class="entrar" id="btn-entrar" type="submit">Entrar</button>
    </form>

    <section id="escolha" aria-live="polite">
      <p class="sub" style="margin:0 0 4px">Você tem mais de uma loja.<br/>Em qual quer entrar?</p>
      <div id="lojas"></div>
      <button class="voltar" id="btn-voltar" type="button">← voltar</button>
    </section>

    <p class="erro" id="erro" role="alert"></p>
  </main>
  <script src="/login.js"></script>
</body>
</html>
