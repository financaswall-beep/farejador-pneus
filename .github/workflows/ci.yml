name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Obra 300: teto de 300 linhas por arquivo de produção (novo >300 = FALHA;
      # herdados congelados em scripts/teto-herdado.json). Roda ANTES do install
      # de propósito — é node puro e barra push de QUALQUER máquina/ferramenta.
      - name: Fiscal de tamanho (teto 300)
        run: node scripts/checar-tamanho.cjs

      - name: Checksums das migrations
        run: node scripts/check-migrations.cjs

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build
