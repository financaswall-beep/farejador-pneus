<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Seja parceiro - 2W</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    min-height: 100vh;
    background: #000;
    color: #fff;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: auto;
  }
  .stage {
    position: relative;
    width: min(100vw, calc(100vh * 1.7779));
    min-width: 960px;
    aspect-ratio: 1672 / 941;
    margin: 0 auto;
    background: #000 url('seja-parceiro-2w.png') center / cover no-repeat;
  }
  .signup-form {
    position: absolute;
    left: 57.76%;
    top: 24.86%;
    width: 34.72%;
    height: 67.16%;
  }
  .field,
  .message {
    position: absolute;
    left: 0;
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    color: #f7f7f1;
    font: 500 18px/1.2 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 0 17px;
    caret-color: #ffd400;
    text-shadow: 0 1px 2px rgba(0, 0, 0, .7);
  }
  .field:focus,
  .message:focus {
    box-shadow: inset 0 0 0 2px rgba(255, 212, 0, .45);
    border-radius: 8px;
  }
  .field::placeholder,
  .message::placeholder { color: transparent; }
  .field { height: 6.9%; }
  .trade { top: 0; }
  .name { top: 12.48%; }
  .phone { top: 24.96%; }
  .email { top: 37.44%; }
  .cities { top: 49.92%; }
  .address { top: 62.4%; }
  .message {
    top: 75.04%;
    height: 12.2%;
    padding-top: 13px;
    resize: none;
  }
  .submit-hit {
    position: absolute;
    left: -9.62%;
    top: 89.98%;
    width: 110.32%;
    height: 10.13%;
    border: 0;
    border-radius: 10px;
    background: linear-gradient(180deg, #ffe700 0%, #ffd100 48%, #f0ae00 100%);
    color: #060606;
    cursor: pointer;
    display: grid;
    grid-template-columns: 42px minmax(0, 1fr) 42px;
    align-items: center;
    gap: 12px;
    padding: 0 22px;
    font: 900 21px/1 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0;
    box-shadow:
      0 12px 26px rgba(255, 196, 0, .28),
      inset 0 1px 0 rgba(255, 255, 255, .55),
      inset 0 -2px 0 rgba(114, 80, 0, .16);
    transition: transform .16s ease, filter .16s ease, box-shadow .16s ease;
  }
  .submit-hit:hover {
    filter: brightness(1.06) saturate(1.05);
    transform: translateY(-1px);
    box-shadow:
      0 16px 34px rgba(255, 196, 0, .35),
      inset 0 1px 0 rgba(255, 255, 255, .65),
      inset 0 -2px 0 rgba(114, 80, 0, .18);
  }
  .submit-hit:active {
    transform: translateY(2px) scale(.995);
    box-shadow:
      0 6px 16px rgba(255, 196, 0, .24),
      inset 0 2px 5px rgba(85, 58, 0, .24);
  }
  .submit-icon,
  .submit-arrow {
    display: grid;
    place-items: center;
    font-size: 30px;
    line-height: 1;
  }
  .submit-text {
    min-width: 0;
    text-align: center;
    white-space: nowrap;
  }
  .submit-hit:focus-visible {
    outline: 3px solid rgba(255, 255, 255, .82);
    outline-offset: 3px;
  }
  .submit-hit:disabled {
    cursor: wait;
    filter: saturate(.7) brightness(.9);
    transform: none;
  }
  .hp {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    opacity: 0;
  }
  .status {
    position: absolute;
    left: 54%;
    top: 40%;
    width: 40%;
    min-height: 180px;
    display: none;
    place-items: center;
    padding: 32px;
    border: 1px solid rgba(255, 212, 0, .58);
    border-radius: 24px;
    background: rgba(8, 9, 7, .9);
    box-shadow: 0 0 42px rgba(255, 212, 0, .18);
    text-align: center;
  }
  .status h1 {
    margin: 0 0 10px;
    font-size: 34px;
  }
  .status p {
    margin: 0;
    color: #d6d6cf;
    font-size: 18px;
    line-height: 1.45;
  }
  .status.err h1 { color: #ffd400; }
  @media (max-aspect-ratio: 1672 / 941) {
    .stage {
      width: calc(100vh * 1.7779);
      min-height: 100vh;
    }
  }
  @media (max-width: 980px) {
    body {
      min-width: 960px;
    }
    .stage {
      width: 960px;
      min-width: 960px;
    }
  }
</style>
</head>
<body>
  <main class="stage" aria-label="Cadastro para parceiros da Rede 2W">
    <form class="signup-form" id="form" aria-label="Formulário de cadastro de parceiro">
      <label class="hp" for="trade_name">Nome da borracharia</label>
      <input class="field trade" id="trade_name" name="trade_name" required maxlength="120" placeholder="Ex: Borracharia do Zé" autocomplete="organization" />

      <label class="hp" for="responsible_name">Seu nome</label>
      <input class="field name" id="responsible_name" name="responsible_name" maxlength="120" placeholder="Quem fala com a gente" autocomplete="name" />

      <label class="hp" for="whatsapp_phone">WhatsApp</label>
      <input class="field phone" id="whatsapp_phone" name="whatsapp_phone" maxlength="40" placeholder="(21) 9..." autocomplete="tel" inputmode="tel" />

      <label class="hp" for="email">E-mail</label>
      <input class="field email" id="email" name="email" type="text" maxlength="160" placeholder="opcional" autocomplete="email" inputmode="email" />

      <label class="hp" for="municipios">Cidade(s) que você atende</label>
      <input class="field cities" id="municipios" name="municipios" maxlength="200" placeholder="Ex: Niterói, São Gonçalo" autocomplete="address-level2" />

      <label class="hp" for="address">Endereço da borracharia</label>
      <input class="field address" id="address" name="address" maxlength="200" placeholder="Rua, número, bairro" autocomplete="street-address" />

      <label class="hp" for="message">Mensagem</label>
      <textarea class="message" id="message" name="message" maxlength="1000" placeholder="Conte um pouco da sua loja (opcional)"></textarea>

      <input class="hp" name="website" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <button class="submit-hit" type="submit" id="btn">
        <span class="submit-icon" aria-hidden="true">♙</span>
        <span class="submit-text" id="btnText">Quero ser parceiro</span>
        <span class="submit-arrow" aria-hidden="true">→</span>
      </button>
    </form>

    <section class="status" id="okCard" role="status" aria-live="polite">
      <div>
        <h1>Candidatura enviada!</h1>
        <p>Recebemos seus dados. Em breve a gente entra em contato pelo WhatsApp.</p>
      </div>
    </section>

    <section class="status err" id="errCard" role="alert" aria-live="assertive">
      <div>
        <h1>Não consegui enviar</h1>
        <p id="errMsg">Tenta de novo?</p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const btnText = document.getElementById('btnText');
    const okCard = document.getElementById('okCard');
    const errCard = document.getElementById('errCard');
    const errMsg = document.getElementById('errMsg');

    function payloadFromForm(formEl) {
      const data = Object.fromEntries(new FormData(formEl).entries());
      for (const key of Object.keys(data)) {
        if (typeof data[key] === 'string') {
          data[key] = data[key].trim();
          if (data[key] === '' && key !== 'trade_name' && key !== 'website') {
            delete data[key];
          }
        }
      }
      return data;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      okCard.style.display = 'none';
      errCard.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Enviando...';

      try {
        const res = await fetch('/api/seja-parceiro', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payloadFromForm(form)),
        });
        if (!res.ok) {
          const payload = await res.json().catch(() => ({}));
          throw new Error(payload.error || ('erro_' + res.status));
        }
        form.style.display = 'none';
        okCard.style.display = 'grid';
      } catch (err) {
        errMsg.textContent = 'Tenta de novo? Detalhe: ' + (err.message || err);
        errCard.style.display = 'grid';
        btn.disabled = false;
        btnText.textContent = 'Quero ser parceiro';
      }
    });
  </script>
</body>
</html>
